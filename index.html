<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天赋探索测试 · 知己知彼，方得始终</title>
<style>
  :root {
    --gold: #c9a84c;
    --dark: #1a1a2e;
    --mid: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --text: #f0e6d3;
    --muted: #a89070;
    --green: #4ecdc4;
    --purple: #a855f7;
    --blue: #3b82f6;
    --orange: #f97316;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 星空背景 */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ===== 封面 ===== */
  #cover {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px 20px;
  }

  .cover-emblem {
    font-size: 80px;
    margin-bottom: 20px;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .cover-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 12px;
    text-shadow: 0 0 30px rgba(201,168,76,0.5);
  }

  .cover-subtitle {
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .cover-desc {
    max-width: 560px;
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
    margin: 20px 0 40px;
    padding: 16px 24px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    background: rgba(201,168,76,0.05);
  }

  .cover-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 40px;
  }

  .tag {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid;
  }

  .tag-mbti { color: var(--green); border-color: var(--green); background: rgba(78,205,196,0.1); }
  .tag-xin { color: var(--gold); border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .tag-psy { color: var(--purple); border-color: var(--purple); background: rgba(168,85,247,0.1); }
  .tag-star { color: var(--orange); border-color: var(--orange); background: rgba(249,115,22,0.1); }
  .tag-ai { color: var(--blue); border-color: var(--blue); background: rgba(59,130,246,0.1); }

  .btn-start {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--gold), #e8c66a);
    color: var(--dark);
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(201,168,76,0.4);
    transition: all 0.3s;
  }

  .btn-start:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(201,168,76,0.6);
  }

  /* ===== 用户信息 ===== */
  #user-info-page {
    display: none;
    min-height: 100vh;
    padding: 60px 20px;
  }

  .page-title {
    font-size: 24px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .page-subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .form-input, .form-select {
    width: 100%;
    padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }

  .form-input:focus, .form-select:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  .form-select option { background: var(--mid); }

  .birth-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  /* ===== 测试区 ===== */
  #test-page {
    display: none;
    min-height: 100vh;
    padding: 20px;
  }

  .progress-bar-wrap {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(26,26,46,0.95);
    backdrop-filter: blur(10px);
    padding: 16px 0;
    margin-bottom: 30px;
    border-bottom: 1px solid rgba(201,168,76,0.1);
  }

  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label { font-size: 13px; color: var(--muted); }
  .progress-num { font-size: 13px; color: var(--gold); }

  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--green));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 36px 0 24px;
  }

  .divider-line { flex: 1; height: 1px; background: rgba(201,168,76,0.2); }

  .divider-label {
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 2px;
    padding: 4px 12px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    background: rgba(201,168,76,0.05);
    white-space: nowrap;
  }

  .question-card {
    background: rgba(15,52,96,0.4);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
    transition: border-color 0.3s;
  }

  .question-card.answered { border-color: rgba(78,205,196,0.4); }

  .question-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 18px;
  }

  .q-num {
    min-width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--gold), #e8c66a);
    color: var(--dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    flex: 1;
  }

  .q-tip {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-style: italic;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .options-grid.single { grid-template-columns: 1fr; }
  .options-grid.three { grid-template-columns: 1fr 1fr 1fr; }

  .option-btn {
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    line-height: 1.5;
    transition: all 0.25s;
  }

  .option-btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: rgba(201,168,76,0.4);
  }

  .option-btn.selected {
    background: rgba(78,205,196,0.15);
    border-color: var(--green);
    color: var(--green);
  }

  /* 5分量表 */
  .scale-wrap {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .scale-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    min-width: 60px;
  }

  .scale-label.right { text-align: right; }

  .scale-btns {
    display: flex;
    gap: 8px;
    flex: 1;
    justify-content: center;
  }

  .scale-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scale-btn:hover { border-color: var(--gold); color: var(--gold); }
  .scale-btn.selected { border-color: var(--gold); background: var(--gold); color: var(--dark); }

  .nav-row {
    display: flex;
    justify-content: center;
    margin: 40px 0 20px;
  }

  .btn-submit {
    padding: 16px 60px;
    background: linear-gradient(135deg, var(--accent), #ff6b6b);
    color: white;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 0 30px rgba(233,69,96,0.4);
    transition: all 0.3s;
  }

  .btn-submit:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(233,69,96,0.6); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ===== 结果页 ===== */
  #result-page {
    display: none;
    padding: 40px 20px 60px;
  }

  .result-hero {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(78,205,196,0.1));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    margin-bottom: 30px;
  }

  .result-archetype-icon { font-size: 72px; margin-bottom: 16px; }

  .result-archetype-name {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 8px;
  }

  .result-archetype-en {
    font-size: 16px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .result-archetype-desc {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    max-width: 600px;
    margin: 0 auto;
  }

  .result-section {
    background: rgba(15,52,96,0.3);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .result-section-title {
    font-size: 18px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* 维度雷达图 */
  .radar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .dim-bars {
    width: 100%;
  }

  .dim-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .dim-bar-label {
    min-width: 100px;
    font-size: 13px;
    color: var(--text);
    text-align: right;
  }

  .dim-bar-track {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }

  .dim-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }

  .dim-bar-val {
    min-width: 36px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
  }

  /* 天赋特质卡片 */
  .traits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }

  .trait-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    transition: all 0.3s;
  }

  .trait-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .trait-icon { font-size: 28px; margin-bottom: 8px; }
  .trait-name { font-size: 14px; color: var(--gold); font-weight: 600; margin-bottom: 6px; }
  .trait-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* 兴趣爱好 */
  .hobbies-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .hobby-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .hobby-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: 4px 0 0 4px;
  }

  .hobby-card:hover { border-color: rgba(201,168,76,0.3); transform: translateX(4px); }

  .hobby-num {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .hobby-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .hobby-why {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .hobby-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    display: inline-block;
  }

  /* 职业方向 */
  .career-grid {
    display: grid;
    gap: 16px;
  }

  .career-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px;
    transition: all 0.3s;
  }

  .career-card:hover { border-color: rgba(78,205,196,0.4); }

  .career-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .career-icon { font-size: 28px; }

  .career-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 2px;
  }

  .career-sub { font-size: 12px; color: var(--muted); }

  .career-desc {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 12px;
  }

  .ai-collab {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 12px;
    font-size: 13px;
    color: #93c5fd;
    line-height: 1.6;
  }

  .ai-collab strong { color: var(--blue); }

  /* 哲学智慧 */
  .wisdom-card {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 14px;
    position: relative;
  }

  .wisdom-quote {
    font-size: 18px;
    color: var(--gold);
    font-style: italic;
    margin-bottom: 8px;
    line-height: 1.6;
  }

  .wisdom-source {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .wisdom-interp {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
  }

  /* MBTI标签 */
  .mbti-badge {
    display: inline-flex;
    gap: 4px;
    margin-top: 12px;
  }

  .mbti-letter {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
  }

  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeInUp 0.5s ease forwards; }

  .btn-retry {
    display: block;
    margin: 30px auto 0;
    padding: 12px 36px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 50px;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s;
  }

  .btn-retry:hover { background: rgba(201,168,76,0.1); }

  .btn-pdf {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 16px auto 0;
    padding: 12px 36px;
    background: linear-gradient(135deg, #e94560, #ff6b6b);
    border: none;
    color: white;
    border-radius: 50px;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(233,69,96,0.3);
  }

  .btn-pdf:hover { transform: scale(1.04); box-shadow: 0 4px 30px rgba(233,69,96,0.5); }

  .action-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-top: 30px;
  }

  /* 天赋同行者 */
  .peers-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 700px) {
    .peers-grid { grid-template-columns: 1fr; }
  }

  .peer-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
  }

  .peer-card:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }

  .peer-avatar-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    position: relative;
  }

  .peer-avatar {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    filter: sepia(20%) brightness(0.9);
    transition: filter 0.3s;
  }

  .peer-card:hover .peer-avatar { filter: sepia(0%) brightness(1); }

  .peer-resonance-badge {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 6px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  .peer-info {
    padding: 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .peer-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
  }

  .peer-era {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  .peer-years {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .peer-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    flex: 1;
  }

  /* ===== 打印/PDF 样式 ===== */
  @media print {
    #stars-canvas, .btn-retry, .btn-pdf, .action-row, #cover, #user-info-page, #test-page { display: none !important; }
    body { background: #fff !important; color: #1a1a1a !important; }
    #result-page { display: block !important; padding: 0; }
    .result-hero { background: #f8f4e8 !important; border-color: #c9a84c !important; }
    .result-archetype-name { color: #8b6914 !important; }
    .result-section { background: #f9f9f9 !important; border-color: #ddd !important; break-inside: avoid; }
    .result-section-title { color: #8b6914 !important; }
    .hobby-name { color: #8b6914 !important; }
    .career-title { color: #1a6b6b !important; }
    .wisdom-quote { color: #8b6914 !important; }
    .ai-collab { background: #e8f0fe !important; border-color: #aac4ff !important; }
    .ai-collab strong { color: #1a4fc2 !important; }
    .dim-bar-fill { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    .page-break { page-break-before: always; }
    a { color: inherit; text-decoration: none; }
  }

  /* 模态提示 */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(233,69,96,0.9);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 14px;
    z-index: 999;
    transition: transform 0.3s;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    .hobbies-grid { grid-template-columns: 1fr; }
    .scale-wrap { flex-direction: column; gap: 4px; }
    .scale-label { min-width: auto; text-align: center; }
    .birth-row { grid-template-columns: 1fr; }

(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.3,
        alpha: Math.random(),
        speed: Math.random() * 0.005 + 0.002
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.alpha += s.speed;
      if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${s.alpha * 0.6})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  resize();
  createStars();
  draw();
  window.addEventListener('resize', () => { resize(); createStars(); });
})();

// 答案存储
let answers = {};
let userInfo = {};

function showUserInfo() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('user-info-page').style.display = 'block';
}

function startTest() {
  userInfo = {
    name: document.getElementById('uname').value || '探索者',
    year: parseInt(document.getElementById('byear').value) || null,
    month: parseInt(document.getElementById('bmonth').value) || null,
    day: parseInt(document.getElementById('bday').value) || null,
    gender: document.getElementById('ugender').value,
    status: document.getElementById('ustatus').value,
    goal: document.getElementById('ugoal').value,
  };
  userInfo.zodiac = getZodiac(userInfo.month, userInfo.day);
  userInfo.mbtiHint = getChineseZodiac(userInfo.year);

  document.getElementById('user-info-page').style.display = 'none';
  document.getElementById('test-page').style.display = 'block';
  renderQuestions();
}

function getZodiac(month, day) {
  if (!month || !day) return null;
  const signs = [
    [1,20,'水瓶座'],[2,19,'双鱼座'],[3,21,'白羊座'],[4,20,'金牛座'],
    [5,21,'双子座'],[6,21,'巨蟹座'],[7,23,'狮子座'],[8,23,'处女座'],
    [9,23,'天秤座'],[10,23,'天蝎座'],[11,22,'射手座'],[12,22,'摩羯座']
  ];
  for (let [m, d, name] of signs) {
    if (month < m || (month === m && day < d)) return name;
  }
  return '摩羯座';
}

function getChineseZodiac(year) {
  if (!year) return null;
  const animals = ['猴','鸡','狗','猪','鼠','牛','虎','兔','龙','蛇','马','羊'];
  return animals[year % 12] + '年';
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  let html = '';
  let currentSection = '';

  QUESTIONS.forEach((q, idx) => {
    if (q.section !== currentSection) {
      currentSection = q.section;
      const sec = SECTIONS.find(s => s.id === currentSection);
      html += `<div class="section-divider">
        <div class="divider-line"></div>
        <div class="divider-label">${sec.icon} 第${['一','二','三','四','五'][SECTIONS.indexOf(sec)]}维度：${sec.name}</div>
        <div class="divider-line"></div>
      </div>`;
    }

    html += `<div class="question-card" id="qcard-${q.id}">
      <div class="question-header">
        <div class="q-num">${q.id}</div>
        <div>
          <div class="q-text">${q.text}</div>
          ${q.tip ? `<div class="q-tip">${q.tip}</div>` : ''}
        </div>
      </div>`;

    if (q.type === 'scale') {
      html += `<div class="scale-wrap">
        <div class="scale-label">${q.left}</div>
        <div class="scale-btns">
          ${[1,2,3,4,5].map(v => `<button class="scale-btn" data-qid="${q.id}" data-val="${v}" onclick="selectScale(${q.id},${v})">${v}</button>`).join('')}
        </div>
        <div class="scale-label right">${q.right}</div>
      </div>`;
    } else {
      const cols = q.options.length === 3 ? 'three' : (q.options.length === 2 ? 'single' : '');
      html += `<div class="options-grid ${cols}">
        ${q.options.map((opt, oi) => `<button class="option-btn" data-qid="${q.id}" data-val="${oi}" onclick="selectOption(${q.id},${oi})">${opt}</button>`).join('')}
      </div>`;
    }

    html += '</div>';
  });

  container.innerHTML = html;
  updateProgress();
}

function selectScale(qid, val) {
  answers[qid] = val;
  document.querySelectorAll(`[data-qid="${qid}"].scale-btn`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.val) === val);
  });
  document.getElementById(`qcard-${qid}`).classList.add('answered');
  updateProgress();
}

function selectOption(qid, val) {
  answers[qid] = val;
  document.querySelectorAll(`[data-qid="${qid}"].option-btn`).forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.val) === val);
  });
  document.getElementById(`qcard-${qid}`).classList.add('answered');
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answers).length;
  document.getElementById('answered-count').textContent = count;
  document.getElementById('progress-fill').style.width = (count / 80 * 100) + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function submitTest() {
  const total = Object.keys(answers).length;
  if (total < 60) {
    showToast(`还有 ${80 - total} 道题未完成，请尽量作答更多题目`);
    return;
  }

  // 计算得分
  const scores = calculateScores();
  const archetype = determineArchetype(scores);
  renderResult(archetype);
}

function calculateScores() {
  const dims = {
    analytical: 0, logical: 0, intellectual: 0, philosophical: 0, pattern: 0,
    creative: 0, artistic: 0, aesthetic: 0, sensory: 0, expression: 0,
    empathy: 0, social: 0, helping: 0, harmony: 0, influence: 0, trust: 0,
    leadership: 0, competitive: 0, execution: 0, 'goal-oriented': 0, agency: 0, assertive: 0,
    breadth: 0, flexibility: 0, explorer: 0, nature: 0, intuitive: 0,
    verbal: 0, spatial: 0, musical: 0, kinesthetic: 0,
    intrinsic: 0, values: 0, mission: 0, justice: 0, independence: 0,
    focus: 0, making: 0, planning: 0,
  };

  const dimCounts = {};
  Object.keys(dims).forEach(k => dimCounts[k] = 0);

  QUESTIONS.forEach(q => {
    if (answers[q.id] === undefined) return;
    const val = answers[q.id];

    if (q.type === 'scale') {
      dims[q.dim] = (dims[q.dim] || 0) + val;
      dimCounts[q.dim] = (dimCounts[q.dim] || 0) + 1;
    } else {
      const selectedDim = q.dims[val];
      if (selectedDim && dims[selectedDim] !== undefined) {
        dims[selectedDim] += 3;
        dimCounts[selectedDim] = (dimCounts[selectedDim] || 0) + 1;
      }
    }
  });

  // 归一化
  const normalized = {};
  Object.keys(dims).forEach(k => {
    if (dimCounts[k] > 0) {
      normalized[k] = dims[k] / (dimCounts[k] * 5);
    } else {
      normalized[k] = 0.3;
    }
  });

  return normalized;
}

function determineArchetype(scores) {
  const archetypeScores = {
    THINKER: (scores.analytical + scores.logical + scores.intellectual + scores.philosophical + scores.pattern) / 5,
    CREATOR: (scores.creative + scores.artistic + scores.aesthetic + scores.sensory + scores.expression) / 5,
    CONNECTOR: (scores.empathy + scores.social + scores.helping + scores.harmony + scores.influence) / 5,
    LEADER: (scores.leadership + scores.competitive + scores.execution + scores['goal-oriented'] + scores.agency) / 5,
    EXPLORER: (scores.breadth + scores.flexibility + scores.explorer + scores.intuitive + scores.nature) / 5,
  };

  let best = 'THINKER', bestScore = 0;
  Object.entries(archetypeScores).forEach(([k, v]) => {
    if (v > bestScore) { bestScore = v; best = k; }
  });

  return { type: best, typeScores: archetypeScores, dimScores: scores };
}
